name: ci

on:
  pull_request:
  push:
    tags-ignore:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Inspect npm package
        run: npm pack --dry-run
